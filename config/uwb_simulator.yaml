# Core UWB simulator configuration

# Naming / discovery
vehicle_model: "iris"            # Underlying Gazebo/SITL vehicle model
drone_prefix: "nexus"            # Prefix used for flat Gazebo model names (nexus1) and ROS namespaces (nexus/1)
model_prefix: "nexus"            # Prefix the UWB simulator discovers from /gazebo/model_states

# Topics
ground_truth_topic: "/gazebo/model_states"
pub_topic_prefix: "/uwb"
# External payload injection topic pattern:
#   /<vehicle>/uwb/tx/payload

# Single onboard UWB node mount
uwb_node:
  id: "uwb"
  position:
    x: 0.0
    y: 0.0
    z: 0.0

# Global UWB parameters
max_twr_freq: 100
duty_cycle: 1.0
publish_as_float: false
raw_signal_protocol: "ds_twr"   # "ds_twr" or "single"
ds_twr_resp_delay_us: 300.0     # responder processing delay
ds_twr_final_delay_us: 350.0    # initiator processing delay before FINAL
ds_twr_resp_missing_probability: 0.0   # probability that a RESP frame is missing from an exchange
ds_twr_final_missing_probability: 0.0  # probability that a FINAL frame is missing from an exchange

# Update rate scheduling
update_rate_hz: 15
debug_rate_hz: 100

# Dropout model
p_drop_base: 0.01
p_drop_slope: 0.005
p_drop_max_distance: 100.0

# Latency model
latency_mu_ms: 5.0
latency_sigma_ms: 2.0
jitter_enabled: true

# Outlier model
outlier_probability: 0.02
outlier_bias_min_m: 0.5
outlier_bias_max_m: 2.0

# LOS / NLOS model
enable_los_check: true
nlos_bias_mm: 150
nlos_sigma_increase: 1.5

# Neighbor selection
k_neighbors: 3
hysteresis_enter_m: 80.0
hysteresis_exit_m: 100.0
hysteresis_enabled: true

# Debug options
enable_debug_topics: false
debug_verbose: false
